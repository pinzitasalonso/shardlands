<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Shardlands — World Builder</title>
  <style>
    body {
      margin: 0; height: 100vh; display: grid; place-items: center;
      background: #0b0d10; color: #efe7d3; font-family: Georgia, serif;
    }
    form {
      background: rgba(28, 21, 14, 0.95); border: 1px solid #6a5430;
      border-radius: 8px; padding: 28px 32px; width: 300px; text-align: center;
    }
    h1 { font-size: 22px; color: #d8b35e; letter-spacing: 2px; margin: 0 0 4px; }
    p { color: #b3a482; font-size: 13px; margin: 0 0 16px; }
    input, button {
      width: 100%; box-sizing: border-box; padding: 10px; margin-top: 8px;
      border-radius: 4px; border: 1px solid #6a5430; font-size: 14px;
    }
    input { background: #16100a; color: #efe7d3; }
    button {
      background: linear-gradient(#7a5f24, #5d471b); color: #f4e9c8; cursor: pointer;
    }
    button:hover { filter: brightness(1.15); }
    #err { color: #e05848; font-size: 13px; min-height: 18px; margin-top: 10px; }
  </style>
</head>
<body>
  <form id="f">
    <h1>World Builder</h1>
    <p>The keeper's key, please.</p>
    <input id="pw" type="password" placeholder="Password" autofocus autocomplete="current-password" />
    <button>Enter</button>
    <div id="err"></div>
  </form>
  <script>
    document.getElementById('f').addEventListener('submit', async (ev) => {
      ev.preventDefault();
      const err = document.getElementById('err');
      err.textContent = '';
      try {
        const r = await fetch('/editor/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: document.getElementById('pw').value }),
        });
        const out = await r.json();
        if (r.ok && out.ok) location.href = '/editor.html';
        else err.textContent = out.error || 'That is not the key.';
      } catch {
        err.textContent = 'The server is not answering.';
      }
    });
  </script>
</body>
</html>
